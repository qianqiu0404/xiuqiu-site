name: Site CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:radar
      - run: npm run build
      - name: Ensure generated public data is committed
        run: git diff --exit-code -- src/data/generatedRadars.ts public/sitemap.xml
