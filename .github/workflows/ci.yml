name: Site CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:radar
      - run: npm run build
      - run: npm run check:public
      - name: Ensure generated public data is committed
        run: >-
          git diff --exit-code --
          src/data/generatedProjects.ts
          src/data/generatedRadars.ts
          src/data/generatedEvidence.ts
          src/data/generatedDeliveries.ts
          src/data/generatedNow.ts
          public/sitemap.xml

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
